<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Distribution Dashboard</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.card { background:white; padding:20px; margin-bottom:20px; border-radius:10px; }
input, button { width:100%; padding:10px; margin:5px 0; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { border:1px solid #ddd; padding:8px; }
th { background:#333; color:white; }
</style>
</head>

<body>

<div class="card">
<h2>Intake</h2>
<form id="form">
<input id="name" placeholder="Name">
<input id="household" type="number" placeholder="Household Size" required>
<input id="zip" value="07030">
<label><input type="checkbox" id="repeat"> Repeat Visit</label>
<button>Submit</button>
</form>

<p>Households: <span id="households">0</span></p>
<p>Individuals: <span id="individuals">0</span></p>

<table>
<thead>
<tr><th>ID</th><th>Name</th><th>Household</th></tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="card">
<h2>Volunteers</h2>

<form id="volForm">
<input id="volName" placeholder="Name" required>
<input id="volRole" placeholder="Role">
<input id="volDate" type="date" required>
<button>Add Volunteer</button>
</form>

<table>
<thead>
<tr><th>Name</th><th>Role</th><th>Date</th></tr>
</thead>
<tbody id="volTable"></tbody>
</table>
</div>

<div class="card">
<h2>Inventory</h2>

<form id="inventoryForm">
<input id="item_name" placeholder="Item Name" required>
<input id="quantity_received" type="number" placeholder="Quantity" required>
<input id="source" placeholder="Source">
<button>Add Inventory</button>
</form>

<button onclick="exportInventory()">Export Report</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Item</th>
<th>Qty Received</th>
<th>Remaining</th>
<th>Use</th>
</tr>
</thead>
<tbody id="inventoryTable"></tbody>
</table>
<script>

// 🔥 ONLY PLACE YOU EVER CHANGE THIS
const API = "https://foodapp-1-8unw.onrender.com";

// ================= INTAKE =================
async function loadData(){
  const res = await fetch(API + "/participants");
  const data = await res.json();

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  let h=0,i=0;

  data.forEach(p=>{
    h++;
    i+=p.household;

    tbody.innerHTML += `<tr>
      <td>${p.id}</td>
      <td>${p.name||""}</td>
      <td>${p.household}</td>
    </tr>`;
  });

  households.innerText = h;
  individuals.innerText = i;
}

form.addEventListener("submit", async e=>{
  e.preventDefault();

  await fetch(API + "/participants",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      name: name.value,
      household: parseInt(household.value),
      zip: zip.value,
      repeat_visit: repeat.checked
    })
  });

  form.reset();
  loadData();
});

// ================= VOLUNTEERS =================
async function loadVolunteers(){
  const res = await fetch(API + "/volunteers");
  const data = await res.json();

  const table = document.getElementById("volTable");
  table.innerHTML="";

  data.forEach(v=>{
    table.innerHTML += `<tr>
      <td>${v.name}</td>
      <td>${v.role||""}</td>
      <td>${v.shift_date}</td>
    </tr>`;
  });
}

volForm.addEventListener("submit", async e=>{
  e.preventDefault();

  await fetch(API + "/volunteers",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      name: volName.value,
      role: volRole.value,
      shift_date: volDate.value
    })
  });

  volForm.reset();
  loadVolunteers();
});

// ================= INVENTORY =================
// ================= INVENTORY =================

// LOAD INVENTORY
async function loadInventory(){
  try {
    const res = await fetch(API + "/inventory");
    const data = await res.json();

    console.log("Inventory:", data);

    const table = document.getElementById("inventoryTable");
    table.innerHTML = "";

    data.forEach(item=>{
      table.innerHTML += `
      <tr>
        <td>${item.id}</td>
        <td>${item.name}</td>
        <td>${item.quantity_received}</td>
        <td>${item.remaining_quantity}</td>
        <td>
          <input id="use-${item.id}" type="number" placeholder="Qty">
          <button onclick="useItem(${item.id})">Use</button>
        </td>
      </tr>`;
    });

  } catch (err) {
    console.error("Inventory load error:", err);
  }
}

// ADD INVENTORY
document.getElementById("inventoryForm").addEventListener("submit", async e=>{
  e.preventDefault();

  try {
  
const payload = {
  name: item_name.value,
  category: source.value,
  quantity: parseInt(quantity_received.value),
  expiry: new Date()
};
    console.log("Adding inventory:", payload);

    await fetch(API + "/inventory",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });

    document.getElementById("inventoryForm").reset();
    loadInventory();

  } catch (err) {
    console.error("Inventory save error:", err);
  }
});

// USE INVENTORY
async function useItem(id){
  try {
    const qty = document.getElementById(`use-${id}`).value;

    if(!qty){
      alert("Enter quantity");
      return;
    }

    const payload = {
      inventory_id: id,
      quantity_used: parseInt(qty)
    };

    console.log("Using inventory:", payload);

    await fetch(API + "/inventory/distribute",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });

    loadInventory();

  } catch (err) {
    console.error("Use inventory error:", err);
  }
}

function exportInventory(){
  let table = document.querySelector("#inventoryTable").parentElement.outerHTML;
  let blob = new Blob([table], {type:"application/vnd.ms-excel"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download="inventory.xls";
  a.click();
}

// INIT
window.onload = ()=>{
  loadData();
  loadVolunteers();
  loadInventory();
};

</script>

</body>
</html>
