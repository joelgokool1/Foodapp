<!DOCTYPE html>
<html>
<head>
<title>Food Dashboard</title>
<style>
body { font-family: Arial; padding:10px; background:#f4f6f8;}
.card { background:white; padding:10px; margin:10px 0; border-radius:8px;}
input,button,select { width:100%; margin:5px 0; padding:8px;}
table { width:100%; border-collapse:collapse;}
td,th { border:1px solid #ddd; padding:5px;}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div class="card">
<h2>Dashboard</h2>
<p>Households: <span id="h">0</span></p>
<p>Individuals: <span id="i">0</span></p>
<p>Distributed: <span id="d">0</span></p>
<button onclick="load()">Refresh</button>
</div>

<!-- INTAKE -->
<div class="card">
<h2>Intake</h2>
<form id="form">
<input id="name" placeholder="Name" required>
<input id="household" type="number" placeholder="Household" required>
<input id="zip" placeholder="Zip" required>
<button>Add</button>
</form>
<p id="status"></p>
</div>

<!-- VOLUNTEERS -->
<div class="card">
<h2>Volunteers</h2>
<form id="volForm">
<input id="vname" placeholder="Name" required>
<input id="vrole" placeholder="Role">
<input id="vdate" type="date" required>
<button>Add Volunteer</button>
</form>
</div>

<!-- INVENTORY -->
<div class="card">
<h2>Inventory (End of Day Tracking)</h2>

<form id="invForm">
<input id="iname" placeholder="Item" required>
<input id="boxes" type="number" placeholder="Boxes" required>
<input id="perbox" type="number" placeholder="Items per Box" required>
<button>Add Inventory</button>
</form>

<table>
<thead>
<tr>
<th>Item</th>
<th>Start Boxes</th>
<th>Remaining Boxes</th>
<th>Used Boxes</th>
<th>Update End of Day</th>
</tr>
</thead>
<tbody id="invTable"></tbody>
</table>

</div>

<!-- REPORT -->
<div class="card">
<h2>Usage Report</h2>
<table>
<thead>
<tr><th>Item</th><th>Used Boxes</th></tr>
</thead>
<tbody id="reportTable"></tbody>
</table>
</div>

<script>
const API = "http://localhost:5000";

// ================= INTAKE =================
form.onsubmit = async e=>{
e.preventDefault();

const data = {
name: name.value,
household: parseInt(household.value),
zip: zip.value
};

const res = await fetch(API+"/participants",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

const result = await res.json();
status.innerText = "Added: "+result.name;

form.reset();
load();
};

// ================= VOLUNTEERS =================
volForm.onsubmit = async e=>{
e.preventDefault();

await fetch(API+"/volunteers",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:vname.value,
role:vrole.value,
shift_date:vdate.value
})
});

volForm.reset();
};

// ================= INVENTORY =================
invForm.onsubmit = async e=>{
e.preventDefault();

await fetch(API+"/inventory",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:iname.value,
number_of_boxes:parseInt(boxes.value),
items_per_box:parseInt(perbox.value)
})
});

invForm.reset();
load();
};

// ================= LOAD DATA =================
async function load(){

// INVENTORY
const inv = await (await fetch(API+"/inventory")).json();
invTable.innerHTML="";
reportTable.innerHTML="";

inv.forEach(i=>{
const remainingBoxes = Math.ceil(i.remaining_quantity / i.items_per_box);
const usedBoxes = i.number_of_boxes - remainingBoxes;

invTable.innerHTML += `
<tr>
<td>${i.name}</td>
<td>${i.number_of_boxes}</td>
<td>${remainingBoxes}</td>
<td>${usedBoxes}</td>
<td>
<input id="r${i.id}" type="number" placeholder="Remaining">
<button onclick="update(${i.id},${i.items_per_box})">Save</button>
</td>
</tr>
`;

reportTable.innerHTML += `
<tr>
<td>${i.name}</td>
<td>${usedBoxes}</td>
</tr>
`;
});

// DASHBOARD
const dash = await (await fetch(API+"/reports/dashboard")).json();
h.innerText = dash.households;
i.innerText = dash.individuals;
d.innerText = dash.total_distributed;
}

// ================= UPDATE END OF DAY =================
async function update(id, perBox){
const val = document.getElementById("r"+id).value;

if(!val){
alert("Enter remaining boxes");
return;
}

const qty = parseInt(val) * perBox;

await fetch(API+"/inventory/reset",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
id,
remaining_quantity:qty
})
});

load();
}

// INIT
load();
</script>

</body>
</html>
