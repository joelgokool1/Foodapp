<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Dashboard</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:10px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
input, button, select { width:100%; padding:10px; margin:5px 0; }
button { background:#007bff; color:white; border:none; }
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ddd; padding:6px; }
th { background:#333; color:white; }
</style>
</head>

<body>

<!-- FILTER -->
<div class="card">
<h2>Filter</h2>
<select id="filter" onchange="loadAll()">
<option value="all">All</option>
<option value="today">Today</option>
<option value="week">Week</option>
<option value="month">Month</option>
</select>
</div>

<!-- DASHBOARD -->
<div class="card">
<h2>Dashboard</h2>
<p>Households: <span id="h">0</span></p>
<p>Individuals: <span id="i">0</span></p>
<p>Distributed: <span id="d">0</span></p>
</div>

<!-- INTAKE -->
<div class="card">
<h2>Intake</h2>
<form id="form">
<input id="name" placeholder="Name">
<input id="household" type="number" placeholder="Household">
<input id="zip" placeholder="Zip">
<button>Add</button>
</form>
</div>

<!-- VOLUNTEERS -->
<div class="card">
<h2>Volunteers</h2>
<form id="volForm">
<input id="vname" placeholder="Name">
<input id="vrole" placeholder="Role">
<input id="vdate" type="date">
<button>Add Volunteer</button>
</form>
</div>

<!-- INVENTORY -->
<div class="card">
<h2>Inventory</h2>
<form id="invForm">
<input id="iname" placeholder="Item">
<input id="boxes" type="number" placeholder="Boxes">
<input id="perbox" type="number" placeholder="Per Box">
<button>Add</button>
</form>

<table>
<thead>
<tr>
<th>Item</th>
<th>Start</th>
<th>Remaining</th>
<th>Used</th>
<th>Update</th>
</tr>
</thead>
<tbody id="invTable"></tbody>
</table>
</div>

<!-- REPORT -->
<div class="card">
<h2>Report</h2>
<button onclick="exportCSV()">Export CSV</button>

<table>
<thead>
<tr><th>Item</th><th>Used</th></tr>
</thead>
<tbody id="reportTable"></tbody>
</table>
</div>

<script>
const API = "https://foodapp-backend.onrender.com";

// ================= INTAKE =================
form.onsubmit = async e=>{
e.preventDefault();

await fetch(API+"/participants",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:name.value,
household:parseInt(household.value)||0,
zip:zip.value
})
});

form.reset();
loadAll();
};

// ================= VOLUNTEERS =================
volForm.onsubmit = async e=>{
e.preventDefault();

await fetch(API+"/volunteers",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:vname.value,
role:vrole.value,
shift_date:vdate.value
})
});

volForm.reset();
};

// ================= INVENTORY =================
invForm.onsubmit = async e=>{
e.preventDefault();

await fetch(API+"/inventory",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:iname.value,
number_of_boxes:parseInt(boxes.value),
items_per_box:parseInt(perbox.value)
})
});

invForm.reset();
loadAll();
};

// ================= LOAD ALL =================
async function loadAll(){

const filter = document.getElementById("filter").value;

// INVENTORY
const inv = await (await fetch(API+"/inventory")).json();

invTable.innerHTML="";
reportTable.innerHTML="";

inv.forEach(i=>{
const remain = Math.ceil(i.remaining_quantity/i.items_per_box);
const used = i.number_of_boxes - remain;

invTable.innerHTML += `
<tr>
<td>${i.name}</td>
<td>${i.number_of_boxes}</td>
<td>${remain}</td>
<td>${used}</td>
<td>
<input id="r${i.id}" type="number">
<button onclick="update(${i.id},${i.items_per_box})">Save</button>
</td>
</tr>`;

reportTable.innerHTML += `
<tr>
<td>${i.name}</td>
<td>${used}</td>
</tr>`;
});

// DASHBOARD
const dash = await (await fetch(API+"/reports/dashboard?filter="+filter)).json();

h.innerText = dash.households;
i.innerText = dash.individuals;
d.innerText = dash.total_distributed;
}

// ================= UPDATE INVENTORY =================
async function update(id, per){
const val = document.getElementById("r"+id).value;

await fetch(API+"/inventory/reset",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
id,
remaining_quantity: val*per
})
});

loadAll();
}

// ================= EXPORT =================
function exportCSV(){
window.open(API+"/reports/export");
}

// INIT
loadAll();
</script>

</body>
</html>
